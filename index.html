<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل الكليات الذكي PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--bg:#000;
--accent:#d4a373;
--text:#fff;
--input:#121212;
--border:#2a2a2a;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Cairo',sans-serif;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid var(--border);
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.bubble{
padding:12px;
border-radius:15px;
max-width:85%;
line-height:1.6;
}

.user{
background:var(--accent);
color:#000;
align-self:flex-end;
}

.bot{
border:1px solid var(--accent);
align-self:flex-start;
}

footer{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid var(--border);
}

input{
flex:1;
padding:10px;
background:var(--input);
border:none;
color:white;
border-radius:10px;
}

.btn{
background:var(--accent);
padding:10px;
border-radius:10px;
cursor:pointer;
}

.mic.active{
background:red;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}
</style>
</head>

<body>

<header>
<div>🎓 دليل الكليات الذكي</div>
<div>
<i class="fas fa-trash cursor-pointer" onclick="clearChat()"></i>
</div>
</header>

<div id="chat"></div>

<footer>
<div id="mic" class="btn mic" onclick="toggleVoice()">
<i class="fas fa-microphone"></i>
</div>

<input id="input" placeholder="اكتب اسم الكلية...">

<div class="btn" onclick="send()">
<i class="fas fa-paper-plane"></i>
</div>
</footer>

<div style="text-align:center;margin-bottom:10px;">
<button onclick="suggest()" class="btn">🎯 اقترحلي كلية</button>
</div>

<script>

// ✅ هنا حطيتلك الـ API Key مباشرة
const API_KEY = "AIzaSyDLG-_lJw_ZD3tyjMMQoIe3CVC-8I9Seos";

let chatHistory = [];
let recognition;
let listening = false;

// تحميل الشات
function loadChat(){
const saved = localStorage.getItem("chat");
if(saved){
chatHistory = JSON.parse(saved);
chatHistory.forEach(m=>{
add(m.role==="user"?"user":"bot", m.parts[0].text);
});
}
}

// حفظ الشات
function saveChat(){
localStorage.setItem("chat", JSON.stringify(chatHistory));
}

// إضافة رسالة للشات
function add(type,text){
const div=document.createElement("div");
div.className="bubble "+type;
div.innerText=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=999999;
}

// إرسال الرسائل للـ Gemini
async function send(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

add("user",text);
chatHistory.push({role:"user",parts:[{text}]});
input.value="";
saveChat();

try{
const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:chatHistory,
systemInstruction:{
parts:[{text:`
أنت مستشار جامعي ذكي في مصر 🇪🇬
- رد بسيط وواضح
- استخدم ايموجي
- لو كلية: (نبذة - تنسيق - مواد - مميزات - عيوب - شغل)
- اربط بالكلام السابق
- لو المستخدم محتار اسأله عن ميوله
`}]
}
})
});

const data=await res.json();
const reply=data.candidates[0].content.parts[0].text;

add("bot",reply);
chatHistory.push({role:"model",parts:[{text:reply}]});
saveChat();

}catch(e){
add("bot","❌ في مشكلة في الاتصال");
}
}

// اقتراح كلية
function suggest(){
document.getElementById("input").value="مش عارفة أختار كلية، ساعدني";
send();
}

// مسح الشات
function clearChat(){
localStorage.clear();
chatHistory=[];
document.getElementById("chat").innerHTML="";
}

// تفعيل الصوت 🎤
if('webkitSpeechRecognition'in window){
recognition=new webkitSpeechRecognition();
recognition.lang='ar-SA';

recognition.onstart=()=>{
listening=true;
document.getElementById("mic").classList.add("active");
};

recognition.onend=()=>{
listening=false;
document.getElementById("mic").classList.remove("active");
};

recognition.onresult=(e)=>{
document.getElementById("input").value=e.results[0][0].transcript;
send();
};
}

function toggleVoice(){
if(!recognition) return alert("المتصفح لا يدعم الصوت");
listening?recognition.stop():recognition.start();
}

loadChat();

</script>

</body>
</html>
